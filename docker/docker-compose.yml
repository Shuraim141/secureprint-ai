# ============================================================
# STEP 7: DOCKER COMPOSE — Full Stack Deployment
# File: docker/docker-compose.yml
# Run: cd docker && docker-compose up -d
# ============================================================

version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: secureprint_postgres
    environment:
      POSTGRES_USER:     secureprint
      POSTGRES_PASSWORD: SecurePrint@2024!
      POSTGRES_DB:       secureprint_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secureprint"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (Cache + Celery Broker) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: secureprint_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass Redis@SecurePrint2024!
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    restart: unless-stopped

  # ── API Backend ──────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: secureprint_api
    environment:
      JWT_SECRET:       "${JWT_SECRET:-CHANGE_THIS_IN_PRODUCTION}"
      DATABASE_URL:     postgresql://secureprint:SecurePrint@2024!@postgres:5432/secureprint_db
      REDIS_URL:        redis://:Redis@SecurePrint2024!@redis:6379/0
      FLASK_ENV:        production
      ML_MODEL_PATH:    /models/defect_detection/model.h5
    volumes:
      - ./models:/models
      - ./uploads:/opt/secureprint/uploads
      - ./logs:/opt/secureprint/logs
      - ./keys:/opt/secureprint/keys:ro   # Read-only keys
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Celery Worker (Async ML tasks) ──────────────────────
  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: secureprint_celery
    command: celery -A backend.api.tasks worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://secureprint:SecurePrint@2024!@postgres:5432/secureprint_db
      REDIS_URL:    redis://:Redis@SecurePrint2024!@redis:6379/0
    volumes:
      - ./models:/models
      - ./uploads:/opt/secureprint/uploads
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ── Frontend Dashboard ──────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: secureprint_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: secureprint_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  # ── Prometheus (Metrics) ─────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: secureprint_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  # ── Grafana (Monitoring Dashboard) ──────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: secureprint_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "Grafana@SecurePrint2024!"
      GF_AUTH_ANONYMOUS_ENABLED:  "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── OctoPrint (3D Printer Control) ──────────────────────
  octoprint:
    image: octoprint/octoprint:latest
    container_name: secureprint_octoprint
    ports:
      - "8080:80"
    environment:
      ENABLE_MJPG_STREAMER: "true"
    volumes:
      - octoprint_data:/octoprint
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0  # Printer serial port
    restart: unless-stopped

  # ── Hyperledger Fabric (Blockchain) ─────────────────────
  # Note: Full Fabric network requires separate setup
  # See: scripts/04_setup_fabric_network.sh
  fabric_ca:
    image: hyperledger/fabric-ca:2.5
    container_name: secureprint_fabric_ca
    environment:
      FABRIC_CA_HOME:                     /etc/hyperledger/fabric-ca-server
      FABRIC_CA_SERVER_CA_NAME:           ca.secureprint.com
      FABRIC_CA_SERVER_TLS_ENABLED:       "true"
      FABRIC_CA_SERVER_PORT:              7054
    ports:
      - "7054:7054"
    volumes:
      - fabric_ca_data:/etc/hyperledger/fabric-ca-server
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  octoprint_data:
  fabric_ca_data:
