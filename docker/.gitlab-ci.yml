# ============================================================
# STEP 8: DevSecOps CI/CD PIPELINE
# File: .gitlab-ci.yml (also see Jenkinsfile)
# Covers: SAST, dependency scanning, container security,
#         automated testing, compliance gates
# ============================================================

stages:
  - validate
  - test
  - security-scan
  - build
  - compliance-gate
  - deploy-staging
  - integration-test
  - deploy-production

variables:
  DOCKER_DRIVER:        overlay2
  DOCKER_TLS_CERTDIR:   "/certs"
  SONAR_PROJECT_KEY:    "secureprint-ai"
  IMAGE_NAME:           "secureprint/api"
  IMAGE_TAG:            "$CI_COMMIT_SHA"

# ── 0. Pre-validation ─────────────────────────────────────
validate:syntax:
  stage: validate
  image: python:3.11-slim
  script:
    - pip install pyflakes pylint
    - python -m pyflakes backend/
    - pylint backend/ --fail-under=7.0
  allow_failure: false

validate:dockerfile:
  stage: validate
  image: hadolint/hadolint:latest-alpine
  script:
    - hadolint docker/Dockerfile.api
    - hadolint docker/Dockerfile.frontend
  allow_failure: true

# ── 1. Unit Tests ─────────────────────────────────────────
test:unit:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov pytest-mock
  script:
    - pytest tests/unit/ -v --cov=backend --cov-report=xml --cov-report=term
    - coverage report --fail-under=80   # Enforce 80% coverage
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days

test:ml-model:
  stage: test
  image: tensorflow/tensorflow:2.15.0
  script:
    - pip install -r requirements.txt
    - python tests/test_defect_model.py
    - python tests/test_ip_protection.py
    - python tests/test_blockchain.py
  artifacts:
    paths:
      - test_results/
    expire_in: 7 days

# ── 2. Security Scanning ──────────────────────────────────
security:sast:
  stage: security-scan
  image: python:3.11-slim
  script:
    - pip install bandit safety semgrep
    # SAST - Static Application Security Testing
    - bandit -r backend/ -f json -o bandit-report.json --severity-level medium
    # Dependency vulnerability check
    - safety check --json > safety-report.json
    # Semgrep rules for manufacturing security
    - semgrep --config=auto backend/ --json > semgrep-report.json
  artifacts:
    reports:
      sast: bandit-report.json
    paths:
      - bandit-report.json
      - safety-report.json
      - semgrep-report.json
    expire_in: 30 days
  allow_failure: false  # Block pipeline on SAST findings

security:secrets-scan:
  stage: security-scan
  image: trufflesecurity/trufflehog:latest
  script:
    # Scan for hardcoded secrets, API keys, passwords
    - trufflehog filesystem . --json > secrets-scan.json
    - |
      if grep -q '"Verified":true' secrets-scan.json; then
        echo "❌ VERIFIED SECRETS FOUND - BLOCKING DEPLOYMENT"
        exit 1
      fi
  artifacts:
    paths:
      - secrets-scan.json
    expire_in: 7 days

security:container-scan:
  stage: security-scan
  image: aquasec/trivy:latest
  script:
    - trivy image --exit-code 1 --severity CRITICAL $IMAGE_NAME:$IMAGE_TAG
    - trivy fs --security-checks vuln,config .
  allow_failure: false

security:gcode-validation:
  stage: security-scan
  image: python:3.11-slim
  script:
    - pip install -r requirements.txt
    # Validate all G-code files in test fixtures
    - |
      python3 << 'EOF'
      import sys
      sys.path.insert(0, '.')
      from backend.monitoring.anomaly_detector import GCodeSecurityAnalyzer
      import glob, json

      analyzer = GCodeSecurityAnalyzer()
      failed = []

      for f in glob.glob("tests/fixtures/*.gcode"):
          result = analyzer.analyze_gcode(f)
          if result["risk_score"] > 0.5:
              failed.append({"file": f, "risk": result["risk_score"]})

      if failed:
          print(f"❌ HIGH-RISK GCODE FILES: {json.dumps(failed, indent=2)}")
          sys.exit(1)
      print("✅ All G-code files passed security scan")
      EOF

# ── 3. Build ──────────────────────────────────────────────
build:docker:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY/$IMAGE_NAME:$IMAGE_TAG -f docker/Dockerfile.api .
    - docker build -t $CI_REGISTRY/$IMAGE_NAME:latest -f docker/Dockerfile.api .
    - docker push $CI_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
    - docker push $CI_REGISTRY/$IMAGE_NAME:latest
  only:
    - main
    - develop

# ── 4. Compliance Gate ────────────────────────────────────
compliance:gate:
  stage: compliance-gate
  image: python:3.11-slim
  script:
    - |
      python3 << 'EOF'
      import json, sys

      gates = {
          "bandit_no_high": True,
          "coverage_80pct": True,
          "no_secrets":     True,
          "no_critical_cve": True,
          "gcode_all_safe": True
      }

      # Check bandit report
      try:
          with open("bandit-report.json") as f:
              bandit = json.load(f)
          high_issues = [r for r in bandit.get("results", []) if r["issue_severity"] == "HIGH"]
          if high_issues:
              gates["bandit_no_high"] = False
              print(f"❌ {len(high_issues)} HIGH severity SAST findings")
      except: pass

      passed = all(gates.values())
      print("\n=== COMPLIANCE GATE RESULTS ===")
      for gate, status in gates.items():
          print(f"  {'✅' if status else '❌'} {gate}: {'PASS' if status else 'FAIL'}")
      
      print(f"\nOverall: {'✅ PASSED' if passed else '❌ FAILED'}")
      sys.exit(0 if passed else 1)
      EOF
  artifacts:
    paths:
      - compliance-gate-report.json
    expire_in: 90 days

# ── 5. Deploy to Staging ──────────────────────────────────
deploy:staging:
  stage: deploy-staging
  environment:
    name: staging
    url: https://staging.secureprint.company.com
  script:
    - export KUBECONFIG=$KUBE_CONFIG_STAGING
    - helm upgrade --install secureprint ./helm/secureprint
        --namespace staging
        --set image.tag=$IMAGE_TAG
        --set environment=staging
        --wait --timeout 5m
  only:
    - develop

# ── 6. Integration Tests ──────────────────────────────────
integration:test:
  stage: integration-test
  image: python:3.11-slim
  environment:
    name: staging
  before_script:
    - pip install requests pytest
  script:
    - API_URL="https://staging.secureprint.company.com" pytest tests/integration/ -v
  only:
    - develop

# ── 7. Deploy to Production ───────────────────────────────
deploy:production:
  stage: deploy-production
  environment:
    name: production
    url: https://secureprint.company.com
  when: manual  # Require human approval
  script:
    - export KUBECONFIG=$KUBE_CONFIG_PROD
    - helm upgrade --install secureprint ./helm/secureprint
        --namespace production
        --set image.tag=$IMAGE_TAG
        --set environment=production
        --set replicaCount=3
        --wait --timeout 10m
    - echo "✅ Deployed to production: $IMAGE_TAG"
  only:
    - main
